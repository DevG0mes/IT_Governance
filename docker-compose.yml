services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_secreta_123
      POSTGRES_DB: inventario_db
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    networks:
      - rede-governance

  api:
    build: ./backend-node
    container_name: node_api
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://admin:senha_secreta_123@db:5432/inventario_db
      - PORT=3000
    networks:
      - rede-governance
  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - rede-governance

networks:
  rede-governance:
    driver: bridge