services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: senha_secreta_123
      POSTGRES_DB: inventario_db
    ports:
      - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    networks:
      - rede-governance

  api:
    build: ./backend-node
    container_name: node_api
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Cloud SQL via .env (recomendado). Defaults apontam para o postgres local do compose.
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-admin}
      - DB_PASS=${DB_PASS:-senha_secreta_123}
      - DB_NAME=${DB_NAME:-inventario_db}
      - DB_DIALECT=${DB_DIALECT:-postgres}
      - DB_SSLMODE=${DB_SSLMODE:-}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=${PORT:-3000}
    networks:
      - rede-governance

  frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - rede-governance

networks:
  rede-governance:
    driver: bridge